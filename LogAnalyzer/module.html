<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <title>LogAnalyzer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="/icons.js"></script>
    %%MODULE_CSS%%
</head>
<body class="theme-dark">
<br><br>

<!-- Gesamter sichtbarer Inhaltsbereich -->
<div class="wrapper">
    <div class="card">

        <!-- Filter- und Steuerbereich -->
        <div class="toolbar">
            <div class="toolbar-grid">
				<label class="toolbar-field toolbar-field-logdatei">
					<span class="field-label-text">Logdatei</span>
					<select id="logDateiSelect" class="native-select-hidden"></select>
					<div class="custom-select" id="logDateiCustom">
						<button type="button" class="custom-select-button" id="logDateiCustomButton">-</button>
						<div class="custom-select-dropdown" id="logDateiCustomDropdown">
							<div class="custom-select-options" id="logDateiCustomOptions"></div>
						</div>
					</div>
				</label>

				<label class="toolbar-field toolbar-field-zeilen">
					<span class="field-label-text">Zeilen pro Seite</span>
					<select id="maxZeilenSelect" class="native-select-hidden">
						<option value="20">20</option>
						<option value="50">50</option>
						<option value="100">100</option>
						<option value="200">200</option>
						<option value="500">500</option>
						<option value="1000">1000</option>
						<option value="2000">2000</option>
						<option value="3000">3000</option>
					</select>
					<div class="custom-select" id="maxZeilenCustom">
						<button type="button" class="custom-select-button" id="maxZeilenCustomButton">50</button>
						<div class="custom-select-dropdown" id="maxZeilenCustomDropdown">
							<div class="custom-select-options" id="maxZeilenCustomOptions"></div>
						</div>
					</div>
				</label>

				<label class="toolbar-field toolbar-field-objektid">
					<span class="field-label-text">ObjektID</span>
					<input id="objektIdFilter" type="text" placeholder="z. B. 12345, 67890">
				</label>

				<label class="toolbar-field toolbar-field-meldungstyp">
					<span class="field-label-text">Meldungstyp</span>
					<div class="multi-select" id="filterTypContainer">
						<button type="button" id="filterTypButton" class="multi-select-button">Alle</button>
						<div class="multi-select-dropdown" id="filterTypDropdown">
							<div class="multi-select-options" id="filterTypOptions"></div>
						</div>
					</div>
				</label>

				<label class="toolbar-field toolbar-field-sender">
					<span class="field-label-text">Sender</span>
					<div class="multi-select" id="senderContainer">
						<button type="button" id="senderButton" class="multi-select-button">Alle</button>
						<div class="multi-select-dropdown" id="senderDropdown">
							<div class="multi-select-options" id="senderOptions"></div>
						</div>
					</div>
				</label>

				<label class="toolbar-field toolbar-field-text">
					<span class="field-label-text">Meldung enthält</span>
					<input id="textFilter" type="text" placeholder="Freitext">
				</label>
            </div>

            <!-- Aktions- und Darstellungssteuerung -->
            <div class="button-row">

                <!-- Theme-Auswahl -->
                <label class="inline-control">
                    <span>Theme:</span>
                    <select id="themeSelect" class="native-select-hidden">
                        <option value="dark">Dark</option>
                        <option value="light">Light</option>
                    </select>
                    <div class="custom-select" id="themeCustom">
                        <button type="button" class="custom-select-button" id="themeCustomButton">Dark</button>
                        <div class="custom-select-dropdown" id="themeCustomDropdown">
                            <div class="custom-select-options" id="themeCustomOptions"></div>
                        </div>
                    </div>
                </label>

                <!-- Umschaltung Standard/Kompakt -->
                <label class="inline-control">
                    <span>UI:</span>
                    <select id="kompaktSelect" class="native-select-hidden">
                        <option value="0">Standard</option>
                        <option value="1">Kompakt</option>
                    </select>
                    <div class="custom-select" id="kompaktCustom">
                        <button type="button" class="custom-select-button" id="kompaktCustomButton">Standard</button>
                        <div class="custom-select-dropdown" id="kompaktCustomDropdown">
                            <div class="custom-select-options" id="kompaktCustomOptions"></div>
                        </div>
                    </div>
                </label>

                <!-- Auswahl des Betriebsmodus -->
                <label class="inline-control">
                    <span>Mode:</span>
                    <select id="betriebsmodusSelect" class="native-select-hidden">
                        <option value="standard">Standard</option>
                        <option value="system">System</option>
                        <option value="ultra">Ultra</option>
                    </select>
                    <div class="custom-select" id="betriebsmodusCustom">
                        <button type="button" class="custom-select-button" id="betriebsmodusCustomButton">Standard</button>
                        <div class="custom-select-dropdown" id="betriebsmodusCustomDropdown">
                            <div class="custom-select-options" id="betriebsmodusCustomOptions"></div>
                        </div>
                    </div>
                </label>

                <!-- Filterungen anwenden und Aktualisieren sowie Blättern -->
                <button id="btnAnwenden">Filter anwenden</button>
                <button id="btnReload" class="secondary">Aktualisieren</button>
                <button id="btnZurueck" class="secondary">Neuere</button>
                <button id="btnVor" class="secondary">Ältere</button>
				
				<!-- Exporte Gesmat aktuell ausgeblendet, da auch voll wenn kein Filter gesetzt -->
				<button id="btnCsvExportGesamt" class="secondary" hidden>CSV komplett</button>
				<button id="btnCsvExportSeite" class="secondary">CSV</button>

            </div>
        </div>

        <!-- Metadaten zur aktuellen Anzeige -->
        <div class="meta">
            <div id="metaDatei">Datei: -</div>
            <div id="metaGroesse">Größe: -</div>
            <div id="metaSeite">Seite: 1</div>
            <div id="metaTreffer">Treffer: -</div>
            <div id="metaLadezeit">Ladezeit Tabelle: -</div>
            <div id="metaFilterLadezeit">Ladezeit Filter: -</div>
            <div id="metaBuildLadezeit">Ladezeit Build: -</div>
            <div id="metaStand">Stand: -</div>
        </div>

        <!-- Ladebalken für Tabellen- und Statusvorgänge -->
        <div id="statusActivity" class="status-activity">
            <div class="status-activity-track">
                <div class="status-activity-bar"></div>
            </div>
            <div id="statusActivityText" class="status-activity-text">Metadaten werden geladen …</div>
        </div>

        <!-- Bereich für Fehlermeldungen -->
        <div id="message" class="message"></div>
		
		<div id="csvExportBox" class="message" style="display:none;"></div>

        <!-- Tabellenanzeige der Logeinträge -->
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th class="col-zeit">Zeit</th>
                    <th class="col-objektid">ObjektID</th>
                    <th class="col-typ">Meldungstyp</th>
                    <th class="col-sender">Sender</th>
                    <th>Meldung</th>
                </tr>
                </thead>
                <tbody id="tbody">
                <tr><td colspan="5" class="empty">Lade Daten …</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Initiale Daten aus dem PHP-Modul
    const INITIAL_DATA = %%INITIAL_DATA%%;
    let currentData = INITIAL_DATA;
    let countRequestRunning = false;
    let lastCountSignature = '';
    let filterMetaRequestRunning = false;
    let lastFilterMetaSignature = '';

    const asyncTriggerState = {
        count: {
            inFlight: false,
            lastSignature: '',
            lastStartedAt: 0
        },
        filter: {
            inFlight: false,
            lastSignature: '',
            lastStartedAt: 0
        }
    };
	
    // Zuordnung zwischen versteckten nativen Selects und sichtbaren Custom-Selects
    const CUSTOM_SELECT_MAPPINGS = [
        { selectId: 'logDateiSelect', customId: 'logDateiCustom' },
        { selectId: 'maxZeilenSelect', customId: 'maxZeilenCustom' },
        { selectId: 'themeSelect', customId: 'themeCustom' },
        { selectId: 'kompaktSelect', customId: 'kompaktCustom' },
        { selectId: 'betriebsmodusSelect', customId: 'betriebsmodusCustom' }
    ];

    // Escaped HTML-Sonderzeichen für sichere Ausgabe im DOM
    function escapeHtml(value) {
        return String(value)
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
    }

    // Formatiert Zahlen für die Anzeige (de-DE)
    function formatInteger(value) {
        const num = Number(value);
        if (!Number.isFinite(num)) {
            return String(value ?? '');
        }
        return Math.round(num).toLocaleString('de-DE');
    }

    // Entfernt leere Werte und Duplikate aus einer Liste
    function uniqueValues(values) {
        return Array.from(new Set((Array.isArray(values) ? values : []).map(v => String(v).trim()).filter(Boolean)));
    }

    // Liefert die aktuell ausgewählten Werte eines Multi-Selects zurück
    function getSelectedValues(optionsId) {
        return Array.from(document.querySelectorAll('#' + optionsId + ' input[type="checkbox"]:checked'))
            .map((input) => input.value);
    }

    // Befüllt ein Multi-Select mit verfügbaren Werten und setzt aktive Auswahl
    function populateMultiSelect(optionsId, values, selectedValues) {
        const container = document.getElementById(optionsId);
        const allValues = uniqueValues([...(Array.isArray(values) ? values : []), ...(Array.isArray(selectedValues) ? selectedValues : [])]);

        container.innerHTML = '';

        allValues.forEach((value) => {
            const label = document.createElement('label');
            label.className = 'multi-select-option';

            const input = document.createElement('input');
            input.type = 'checkbox';
            input.value = value;
            input.checked = Array.isArray(selectedValues) && selectedValues.includes(value);

            input.addEventListener('change', () => {
                updateMultiSelectButtonText(optionsId);
            });

            label.appendChild(input);
            label.appendChild(document.createTextNode(' ' + value));
            container.appendChild(label);
        });
    }

    // Aktualisiert den Button-Text eines Multi-Selects anhand der Auswahl
    function updateMultiSelectButtonText(optionsId) {
        const mapping = {
            filterTypOptions: 'filterTypButton',
            senderOptions: 'senderButton'
        };

        const button = document.getElementById(mapping[optionsId]);
        const selected = getSelectedValues(optionsId);

        if (selected.length === 0) {
            button.textContent = 'Alle';
            return;
        }

        if (selected.length <= 2) {
            button.textContent = selected.join(', ');
            return;
        }

        button.textContent = selected.length + ' ausgewählt';
    }

    // Synchronisiert ein einzelnes Custom-Select mit seinem nativen Select
    function syncCustomSelect(selectId, customId) {
        const select = document.getElementById(selectId);
        const custom = document.getElementById(customId);

        if (!select || !custom) {
            return;
        }

        const button = custom.querySelector('.custom-select-button');
        const optionsContainer = custom.querySelector('.custom-select-options');
        const selectedValue = String(select.value ?? '');
        const selectOptions = Array.from(select.options || []);

        optionsContainer.innerHTML = '';

        let selectedLabel = '';

        selectOptions.forEach((option) => {
            const value = String(option.value ?? '');
            const label = option.textContent || value;

            if (value === selectedValue) {
                selectedLabel = label;
            }

            const optionButton = document.createElement('button');
            optionButton.type = 'button';
            optionButton.className = 'custom-select-option' + (value === selectedValue ? ' is-selected' : '');
            optionButton.textContent = label;
            optionButton.dataset.value = value;

            optionButton.addEventListener('click', () => {
                const changed = select.value !== value;
                select.value = value;
                syncCustomSelect(selectId, customId);
                custom.classList.remove('open');

                if (changed) {
                    select.dispatchEvent(new Event('change', { bubbles: true }));
                }
            });

            optionsContainer.appendChild(optionButton);
        });

		const finalLabel = selectedLabel || (selectOptions[0] ? (selectOptions[0].textContent || selectOptions[0].value) : '-');

		button.innerHTML = '';
		const textSpan = document.createElement('span');
		textSpan.className = 'custom-select-button-text';
		textSpan.textContent = finalLabel;
		button.appendChild(textSpan);
    }

    // Synchronisiert alle Custom-Selects mit den nativen Select-Elementen
    function syncAllCustomSelects() {
        CUSTOM_SELECT_MAPPINGS.forEach(({ selectId, customId }) => {
            syncCustomSelect(selectId, customId);
        });
    }

    // Initialisiert ein Custom-Select und verknüpft es mit einem nativen Select
    function initCustomSelect(selectId, customId) {
        const select = document.getElementById(selectId);
        const custom = document.getElementById(customId);

        if (!select || !custom) {
            return;
        }

        const button = custom.querySelector('.custom-select-button');

        button.addEventListener('click', (event) => {
            event.stopPropagation();

            document.querySelectorAll('.custom-select.open').forEach((element) => {
                if (element !== custom) {
                    element.classList.remove('open');
                }
            });

            document.querySelectorAll('.multi-select.open').forEach((element) => {
                element.classList.remove('open');
            });

            custom.classList.toggle('open');
        });

        select.addEventListener('change', () => {
            syncCustomSelect(selectId, customId);
        });

        syncCustomSelect(selectId, customId);
    }

    // Sammelt alle gesetzten Filterwerte aus der Oberfläche
    function collectFilterData() {
        return {
            filterTypen: getSelectedValues('filterTypOptions'),
            objektIdFilter: document.getElementById('objektIdFilter').value.trim(),
            senderFilter: getSelectedValues('senderOptions'),
            textFilter: document.getElementById('textFilter').value.trim()
        };
    }

    // Native Selects werden nicht mehr sichtbar verwendet
    function refreshNativeSelects() {
        syncAllCustomSelects();
    }

    // Wendet Theme- und Kompaktmodus-Einstellungen auf die Oberfläche an
    function applyViewSettings(status) {
        const theme = (status.theme || 'dark') === 'light' ? 'light' : 'dark';
        const kompakt = !!status.kompakt;

        document.documentElement.classList.remove('theme-dark', 'theme-light');
        document.documentElement.classList.add('theme-' + theme);

        document.body.classList.remove('theme-dark', 'theme-light');
        document.body.classList.add('theme-' + theme);

        document.body.classList.toggle('compact', kompakt);

        document.getElementById('themeSelect').value = theme;
        document.getElementById('kompaktSelect').value = kompakt ? '1' : '0';

        requestAnimationFrame(() => {
            refreshNativeSelects();
        });
    }

    // Nimmt neue Daten vom Backend entgegen, validiert sie und startet das Rendering
	function handleMessage(data) {
		try {
			let parsed = data;
			if (typeof data === 'string') {
				parsed = JSON.parse(data);
			}

			console.debug('[LogAnalyzer] handleMessage', {
				rawType: typeof data,
				parsedOk: !!parsed,
				mode: parsed?.betriebsmodus || '',
				logDatei: parsed?.logDatei || '',
				hits: parsed?.trefferGesamt,
				tableLoading: !!parsed?.tabellenLadungLaeuft,
				countLoading: !!parsed?.zaehlungLaeuft,
				filterLoading: !!parsed?.filterMetadatenLaeuft,
				rows: Array.isArray(parsed?.zeilen) ? parsed.zeilen.length : 0
			});

			debugActivityState(parsed, 'handleMessage-before-render');
			render(parsed);
		} catch (e) {
			console.error('Fehler in handleMessage', e, data);
			const msg = document.getElementById('message');
			if (msg) {
				msg.style.display = 'block';
				msg.textContent = 'Fehler in handleMessage: ' + e.message;
			}
		}
	}

    // Übernimmt eine ObjektID per Doppelklick in den ObjektID-Filter
    function uebernehmeObjektIdInFilter(objektId) {
        const input = document.getElementById('objektIdFilter');
        if (!input) {
            return;
        }

        const neuerWert = String(objektId || '').trim();
        if (neuerWert === '') {
            return;
        }

        const vorhandene = input.value
            .split(/[\s,;]+/)
            .map(v => v.trim())
            .filter(Boolean);

        if (!vorhandene.includes(neuerWert)) {
            vorhandene.push(neuerWert);
        }

        input.value = vorhandene.join(', ');
    }

	// Übernimmt eine ObjektID per Doppelklick in den ObjektID-Filter
	function renderCsvExportListe(data) {
		const csvExportBox = document.getElementById('csvExportBox');
		const istUltra = String(data?.betriebsmodus || '') === 'ultra';

		if (!csvExportBox) {
			return;
		}

		const meldungen = [];
		const liste = Array.isArray(data?.csvExportListe) ? data.csvExportListe : [];

		if (data?.csvExportLaeuft) {
			meldungen.push('<div><strong>CSV Export wird erstellt …</strong></div>');
		}

		if (data?.csvExportFehlermeldung) {
			meldungen.push('<div>' + escapeHtml(data.csvExportFehlermeldung) + '</div>');
		}

		if (liste.length > 0) {
			let html = '<div><strong>CSV-Downloads</strong></div>';
			html += '<div class="csv-export-list">';

			liste.forEach((eintrag) => {
				const token = escapeHtml(eintrag.token || '');
				const dateiname = escapeHtml(eintrag.dateiname || 'export.csv');
				const scopeText = escapeHtml(eintrag.scopeText || '');
				const groesse = escapeHtml(eintrag.dateigroesseFormatiert || '');
				const ablauf = escapeHtml(eintrag.laeuftAbText || '');
				const logDatei = escapeHtml(eintrag.logDatei || '');
				const downloadUrl = String(eintrag.downloadUrl || '').trim();
				const downloadLink = downloadUrl !== ''
					? '<a href="' + escapeHtml(downloadUrl) + '" target="_blank" rel="noopener">Download</a>'
					: '';

				const deleteLink = '<a href="#" data-csv-delete-token="' + token + '">Löschen</a>';
				const aktuellHinweis = eintrag.istAktuelleLogDatei ? ' · aktuelle Logdatei' : '';

				html += '<div class="csv-export-entry">';
				html += '<div><strong>' + dateiname + '</strong></div>';
				html += '<div>' + scopeText
					+ (groesse ? ' · ' + groesse : '')
					+ (ablauf ? ' · gültig bis ' + ablauf : '')
					+ aktuellHinweis
					+ '</div>';
				if (logDatei) {
					html += '<div>' + logDatei + '</div>';
				}
				html += '<div>' + [downloadLink, deleteLink].filter(Boolean).join(' · ') + '</div>';
				html += '</div>';
			});

			html += '</div>';
			meldungen.push(html);
		}

		csvExportBox.innerHTML = meldungen.join('');
		csvExportBox.style.display = ((istUltra && meldungen.length > 0) || liste.length > 0) ? 'block' : 'none';
	}

	// Rendert die komplette Oberfläche anhand der aktuellen Datenstruktur
    function render(data) {
        currentData = data || {};

        const status = currentData.status || {
            seite: 0,
            maxZeilen: 50,
            theme: 'dark',
            kompakt: false,
            filterTypen: [],
            objektIdFilter: '',
            senderFilter: [],
            textFilter: '',
            tabellenLadungLaeuft: false,
            tabellenLadungText: ''
        };

        applyViewSettings(status);

        const logDateiSelect = document.getElementById('logDateiSelect');
        const verfuegbareLogdateien = Array.isArray(currentData.verfuegbareLogdateien) ? currentData.verfuegbareLogdateien : [];
        const aktuelleLogDatei = currentData.aktuelleLogDatei || currentData.logDatei || '';

        logDateiSelect.innerHTML = '';
        verfuegbareLogdateien.forEach((eintrag) => {
            const option = document.createElement('option');
            option.value = eintrag.pfad || '';
            option.textContent = eintrag.anzeige || eintrag.dateiname || eintrag.pfad || '';
            option.selected = option.value === aktuelleLogDatei;
            logDateiSelect.appendChild(option);
        });

        const maxZeilenSelect = document.getElementById('maxZeilenSelect');
        const aktuelleMaxZeilen = Number(currentData.maxZeilen || status.maxZeilen || 50);
        maxZeilenSelect.value = String(aktuelleMaxZeilen);

        const verfuegbareTypen = uniqueValues(currentData.verfuegbareFilterTypen || []);
        const verfuegbareSender = uniqueValues(currentData.verfuegbareSender || []);
        const aktiveTypen = uniqueValues(status.filterTypen || []);
        const aktiveSender = uniqueValues(status.senderFilter || []);

        populateMultiSelect('filterTypOptions', verfuegbareTypen, aktiveTypen);
        populateMultiSelect('senderOptions', verfuegbareSender, aktiveSender);
        updateMultiSelectButtonText('filterTypOptions');
        updateMultiSelectButtonText('senderOptions');

        document.getElementById('textFilter').value = status.textFilter ?? '';
        document.getElementById('objektIdFilter').value = status.objektIdFilter ?? '';

        document.getElementById('metaDatei').textContent = 'Datei: ' + (currentData.logDatei || '-');
        document.getElementById('metaGroesse').textContent = 'Größe: ' + (currentData.dateiGroesse || '-');
        document.getElementById('metaSeite').textContent = 'Seite: ' + ((Number(status.seite || 0)) + 1);
        document.getElementById('metaStand').textContent = 'Stand: ' + (currentData.zeitstempel || '-');
        document.getElementById('metaLadezeit').textContent = 'Ladezeit Tabelle: ' + ((currentData.ladezeitMs ?? 0)) + ' ms';
        document.getElementById('metaFilterLadezeit').textContent = 'Ladezeit Filter: ' + ((currentData.filterLadezeitMs ?? 0) > 0 ? (currentData.filterLadezeitMs + ' ms') : '-');
        const istUltra = String(currentData.betriebsmodus || '') === 'ultra';
        const buildDauerMs = Number(currentData.ultraBuildDauerMs ?? status.ultraBuildDauerMs ?? 0);
        document.getElementById('metaBuildLadezeit').textContent = istUltra && buildDauerMs > 0 ? ('Ladezeit Build: ' + buildDauerMs + ' ms') : 'Ladezeit Build: -';

        document.getElementById('betriebsmodusSelect').value = currentData.betriebsmodus || 'standard';
        syncAllCustomSelects();

        const metaTreffer = document.getElementById('metaTreffer');
        if (currentData.zaehlungLaeuft) {
            metaTreffer.textContent = 'Treffer: wird ermittelt …';
        } else if (typeof currentData.trefferGesamt === 'number' && currentData.trefferGesamt >= 0) {
            metaTreffer.textContent =
                'Bereich: ' + formatInteger(currentData.bereichVon || 0) + '–' + formatInteger(currentData.bereichBis || 0) +
                ' von ' + formatInteger(currentData.trefferGesamt);
        } else {
            metaTreffer.textContent = 'Treffer: -';
        }

        const statusActivity = document.getElementById('statusActivity');
        const statusActivityTrack = statusActivity.querySelector('.status-activity-track');
        const statusActivityText = document.getElementById('statusActivityText');

        const fallbackLaedtTabelle = Boolean(currentData.tabellenLadungLaeuft || status.tabellenLadungLaeuft);
        const fallbackTabellenText = String(currentData.tabellenLadungText || status.tabellenLadungText || '').trim();
        const fallbackLaedtTreffer = Boolean(currentData.zaehlungLaeuft);
        const fallbackLaedtFilter = Boolean(currentData.filterMetadatenLaeuft);

        const ladebalkenAktiv =
            typeof currentData.anzeigeLadebalken === 'boolean'
                ? currentData.anzeigeLadebalken
                : fallbackLaedtTabelle;

        const ladebalkenText =
            typeof currentData.anzeigeLadebalkenText === 'string' && currentData.anzeigeLadebalkenText.trim() !== ''
                ? currentData.anzeigeLadebalkenText.trim()
                : (fallbackTabellenText || 'Tabelle wird geladen …');

        const hintergrundAktiv = false;
        const hintergrundText = '';

        if (ladebalkenAktiv) {
            statusActivity.classList.add('active');
            statusActivityText.textContent = ladebalkenText;
            if (statusActivityTrack) {
                statusActivityTrack.style.display = '';
            }
        } else {
            statusActivity.classList.remove('active');
            statusActivityText.textContent = '';
            if (statusActivityTrack) {
                statusActivityTrack.style.display = 'none';
            }
        }

        const msg = document.getElementById('message');
        if (currentData.ok === false && currentData.fehlermeldung) {
            msg.style.display = 'block';
            msg.textContent = currentData.fehlermeldung;
        } else {
            msg.style.display = 'none';
            msg.textContent = '';
        }

		const btnCsvExportGesamt = document.getElementById('btnCsvExportGesamt');
		const btnCsvExportSeite = document.getElementById('btnCsvExportSeite');
		const csvExportLaeuft = !!currentData.csvExportLaeuft;

		if (btnCsvExportGesamt) {
			btnCsvExportGesamt.style.display = istUltra ? '' : 'none';
			btnCsvExportGesamt.disabled = !istUltra || csvExportLaeuft;
		}
		if (btnCsvExportSeite) {
			btnCsvExportSeite.style.display = istUltra ? '' : 'none';
			btnCsvExportSeite.disabled = !istUltra || csvExportLaeuft;
		}

		renderCsvExportListe(currentData);

        const tbody = document.getElementById('tbody');
        const rows = Array.isArray(currentData.zeilen) ? currentData.zeilen : [];

        console.debug('[LogAnalyzer] render-table-state', {
            ladebalkenAktiv,
            ladebalkenText,
            hintergrundAktiv,
            hintergrundText,
            rowsLength: rows.length,
            trefferGesamt: currentData.trefferGesamt
        });

        if (ladebalkenAktiv && rows.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="empty">Lade Daten …</td></tr>';
            return;
        }

        if (!ladebalkenAktiv && rows.length === 0 && hintergrundAktiv) {
            tbody.innerHTML = '<tr><td colspan="5" class="empty">Status wird aktualisiert …</td></tr>';
            return;
        }

        tbody.innerHTML = '';

        if (rows.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="empty">Keine passenden Logzeilen gefunden.</td></tr>';
        } else {
            rows.forEach((row) => {
                const tr = document.createElement('tr');
                tr.innerHTML =
                    '<td class="col-zeit">' + escapeHtml(row.zeitstempel || '') + '</td>' +
                    '<td class="col-objektid">' + escapeHtml(row.objektId || '') + '</td>' +
                    '<td class="col-typ">' + escapeHtml(row.typ || '') + '</td>' +
                    '<td class="col-sender">' + escapeHtml(row.sender || '') + '</td>' +
                    '<td>' + escapeHtml(row.meldung || '') + '</td>';

                const objektIdCell = tr.querySelector('.col-objektid');
                if (objektIdCell) {
                    objektIdCell.style.cursor = 'pointer';
                    objektIdCell.title = 'Doppelklick übernimmt die ObjektID in den Filter';

                    objektIdCell.addEventListener('dblclick', () => {
                        uebernehmeObjektIdInFilter(row.objektId || '');
                    });
                }

                tbody.appendChild(tr);
            });
        }

        const aktuelleSeite = Number(status.seite || 0);
        const trefferGesamt = Number(currentData.trefferGesamt ?? -1);
        const maxZeilen = Number(currentData.maxZeilen || 0);

        document.getElementById('btnZurueck').disabled = aktuelleSeite <= 0;

        if (trefferGesamt >= 0 && maxZeilen > 0) {
            const maxSeite = Math.max(0, Math.ceil(trefferGesamt / maxZeilen) - 1);
            document.getElementById('btnVor').disabled = aktuelleSeite >= maxSeite;
        } else {
            document.getElementById('btnVor').disabled = !currentData.hatWeitere;
        }


    }

	// Erstellt eine Signatur zur Erkennung identischer asynchroner Requests
    function buildAsyncSignature(data, kind) {
        const status = data && data.status ? data.status : {};

        const logDatei = String(data?.logDatei || data?.aktuelleLogDatei || '');
        const modus = String(data?.betriebsmodus || '');
        const seite = Number(status?.seite || 0);
        const maxZeilen = Number(data?.maxZeilen || status?.maxZeilen || 0);

        const filterTypen = Array.isArray(status?.filterTypen) ? [...status.filterTypen].sort().join('|') : '';
        const senderFilter = Array.isArray(status?.senderFilter) ? [...status.senderFilter].sort().join('|') : '';
        const objektIdFilter = String(status?.objektIdFilter || '');
        const textFilter = String(status?.textFilter || '');

        const basis =
            [
                kind,
                logDatei,
                modus,
                seite,
                maxZeilen,
                filterTypen,
                senderFilter,
                objektIdFilter,
                textFilter
            ].join('||');

        return basis;
    }

	// Gibt Debug-Informationen zum aktuellen Aktivitäts- und Ladezustand aus
	function debugActivityState(data, source) {
		const status = data?.status || {};
		const isUltra = (data?.betriebsmodus || '') === 'ultra';

		const tableLoading = !!data?.tabellenLadungLaeuft;
		const countLoading = !!data?.zaehlungLaeuft;
		const filterLoading = !!data?.filterMetadatenLaeuft;
		const anyLoading = tableLoading || countLoading || filterLoading;

		console.debug('[LogAnalyzer] activity-state', {
			source: source || '-',
			mode: data?.betriebsmodus || '',
			isUltra,
			logDatei: data?.logDatei || '',
			tableLoading,
			countLoading,
			filterLoading,
			anyLoading,
			tableText: data?.tabellenLadungText || '',
			hits: data?.trefferGesamt,
			rows: Array.isArray(data?.zeilen) ? data.zeilen.length : 0,
			hasMore: !!data?.hatWeitere,
			filterLoaded: !!data?.filterMetadatenGeladen,
			filterLoadTime: data?.filterLadezeitMs,
			tableLoadTime: data?.ladezeitMs,
			ultraBuildLaeuft: !!status?.ultraBuildLaeuft,
			ultraIndexBereit: !!status?.ultraIndexBereit,
			ultraBuildDatei: status?.ultraBuildDatei || ''
		});
	}

    // Öffnet oder schließt die Typ-Auswahl
    document.getElementById('filterTypButton').addEventListener('click', (event) => {
        event.stopPropagation();
        document.querySelectorAll('.custom-select.open').forEach((element) => {
            element.classList.remove('open');
        });
        document.getElementById('filterTypContainer').classList.toggle('open');
    });

    // Öffnet oder schließt die Sender-Auswahl
    document.getElementById('senderButton').addEventListener('click', (event) => {
        event.stopPropagation();

            element.classList.remove('open');
        });
        document.getElementById('senderContainer').classList.toggle('open');
    });

    // Schließt offene Dropdowns bei Klick außerhalb
    document.addEventListener('click', (event) => {
        const typContainer = document.getElementById('filterTypContainer');
        const senderContainer = document.getElementById('senderContainer');

        if (!typContainer.contains(event.target)) {
            typContainer.classList.remove('open');
        }

        if (!senderContainer.contains(event.target)) {
            senderContainer.classList.remove('open');
        }

        document.querySelectorAll('.custom-select.open').forEach((element) => {
            if (!element.contains(event.target)) {
                element.classList.remove('open');

        });
    });
